<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wörterbingo</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 40px;
    background: #f5f5f5;
}

.controls {
    margin-bottom: 20px;
}

input {
    padding: 6px;
    margin: 4px;
}

button {
    padding: 6px 12px;
    cursor: pointer;
}

.word {
    display: inline-block;
    background: white;
    padding: 12px 18px;
    margin: 8px;
    border-radius: 10px;
    font-size: 20px;
    cursor: pointer;
    border: 2px solid #ddd;
}

.word:hover {
    background: #ffdede;
}

#codeBox {
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: white;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 12px;
    text-align: right;
    cursor: pointer;
}

#codeBox:hover {
    background: #f0f0f0;
}
</style>
</head>

<body>

<h1>🎯 Wörterbingo</h1>

<div class="controls">
    Normal:
    <input type="number" id="normalCount" value="5" min="0">

    Goofy:
    <input type="number" id="goofyCount" value="0" min="0">

    <br><br>

    Gist:
    <input type="text" id="gistInput" placeholder="https://gist.github.com/...">
    <button onclick="addGist()">+</button>

    <div id="gistList"></div>

    <br>
    <button onclick="generateNewCode()">Neue Wörter</button>
</div>

<div id="words"></div>

<div id="codeBox" onclick="changeCode()">
    Diese Wörter sind mit diesem Code generiert:<br>
    <b id="codeDisplay">----</b><br>
    <small>Code ändern</small>
</div>

<script>
const DEFAULT_GIST = "https://gist.github.com/increpare/4ab077493083edb18919b3666517f248";
const GOOFY_GIST = "https://gist.github.com/To-Biobis/271f2a8d44bb5bcfa5156b385843abbd";

let customGists = [];
let allWords = [];
let currentWords = [];
let seed = 1;
let currentCode = "";

// Seed RNG
function seededRandom() {
    seed = (seed * 1664525 + 1013904223) % 4294967296;
    return seed / 4294967296;
}

function setSeed(s) {
    seed = s;
}

// Code Format:
// A1B2
// A,B = seed
// 1 = normal
// 2 = goofy

function encodeCode(seedNum, normal, goofy) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    const a = chars[(seedNum >> 5) % chars.length];
    const b = chars[(seedNum >> 1) % chars.length];

    return a + normal + b + goofy;
}

function decodeCode(code) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    const a = chars.indexOf(code[0]);
    const b = chars.indexOf(code[2]);

    const seedNum = a * 100 + b;

    const normal = parseInt(code[1]) || 0;
    const goofy = parseInt(code[3]) || 0;

    return { seedNum, normal, goofy };
}

function updateCodeDisplay() {
    document.getElementById("codeDisplay").textContent = currentCode;
    history.replaceState(null, "", "?code=" + currentCode);
}

function generateNewCode() {
    const seedNum = Math.floor(Math.random() * 1000);
    const normal = parseInt(document.getElementById("normalCount").value) || 0;
    const goofy = parseInt(document.getElementById("goofyCount").value) || 0;

    currentCode = encodeCode(seedNum, normal, goofy);
    applyCode();
}

function changeCode() {
    const code = prompt("Code eingeben:", currentCode);
    if (!code) return;

    currentCode = code.toUpperCase();
    applyCode();
}

function extractWords(text) {
    return text
        .split("\n")
        .map(w => w.trim())
        .filter(w => w.length > 0);
}

function getGistId(url) {
    const match = url.match(/gist\.github\.com\/.*\/([a-f0-9]+)/i);
    return match ? match[1] : null;
}

async function fetchGist(url) {
    const id = getGistId(url);
    if (!id) return [];

    const res = await fetch(`https://api.github.com/gists/${id}`);
    const data = await res.json();

    let text = "";
    for (const file in data.files) {
        text += data.files[file].content + "\n";
    }

    return extractWords(text);
}

function addGist() {
    const input = document.getElementById("gistInput");
    if (!input.value) return;

    customGists.push(input.value);
    input.value = "";
    updateGistList();
}

function updateGistList() {
    const div = document.getElementById("gistList");
    div.innerHTML = "<b>Eigene Gists:</b><br>";

    customGists.forEach((g, i) => {
        div.innerHTML += g + 
            ` <button onclick="removeGist(${i})">X</button><br>`;
    });
}

function removeGist(i) {
    customGists.splice(i, 1);
    updateGistList();
}

function pickWord() {
    if (allWords.length === 0) return "";
    return allWords[Math.floor(seededRandom() * allWords.length)];
}

function renderWords() {
    const div = document.getElementById("words");
    div.innerHTML = "";

    currentWords.forEach((word, i) => {
        const el = document.createElement("div");
        el.className = "word";
        el.textContent = word;

        el.onclick = () => {
            currentWords[i] = pickWord();
            renderWords();
        };

        div.appendChild(el);
    });
}

async function applyCode() {
    const decoded = decodeCode(currentCode);

    document.getElementById("normalCount").value = decoded.normal;
    document.getElementById("goofyCount").value = decoded.goofy;

    setSeed(decoded.seedNum);

    updateCodeDisplay();

    const normalWords = await fetchGist(DEFAULT_GIST);
    const goofyWords = await fetchGist(GOOFY_GIST);

    let customWords = [];
    for (const g of customGists) {
        customWords = customWords.concat(await fetchGist(g));
    }

    allWords = [
        ...normalWords,
        ...goofyWords,
        ...customWords
    ];

    const total = decoded.normal + decoded.goofy;

    currentWords = [];
    for (let i = 0; i < total; i++) {
        currentWords.push(pickWord());
    }

    renderWords();
}

function loadFromURL() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
        currentCode = code.toUpperCase();
    } else {
        generateNewCode();
        return;
    }

    applyCode();
}

loadFromURL();
</script>

</body>
</html>
