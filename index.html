<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wörterbingo</title>
<style>
body { font-family: Arial; text-align: center; margin:40px; background:#f5f5f5;}
.word { display:inline-block; background:white; padding:12px 18px; margin:8px; border-radius:10px; font-size:20px; cursor:pointer; border:2px solid #ddd;}
.word:hover { background:#ffdede; }
textarea { width:300px; height:120px; }
</style>
</head>
<body>

<h1>🎯 Wörterbingo sehr real ☯️YIPPY</h1>

<div id="controls">
    Normal:
    <input type="number" id="normalCount" value="5" min="0">
    Goofy:
    <input type="number" id="goofyCount" value="0" min="0">
    <br><br>
    Eigene Wörter (eine Zeile = ein Wort)(Brauchst du eh net):
    <br>
    <textarea id="customWords"></textarea>
    <br><br>
    Dein Code (Text eingeben):
    <input type="text" id="fancyCode" placeholder="z.B. MeinCode">
    <br><br>
    <button onclick="generate()">Generieren</button>
</div>

<div id="words"></div>

<script>
const DEFAULT_GIST = "https://gist.github.com/increpare/4ab077493083edb18919b3666517f248";
const GOOFY_GIST = "https://gist.github.com/To-Biobis/271f2a8d44bb5bcfa5156b385843abbd";

let listA = [];
let listB = [];
let poolA = [];
let poolB = [];

let seed = 1;

// ===== Seeded RNG =====
function srand(s) { seed = s; }
function rand() { seed = (seed * 1664525 + 1013904223) % 4294967296; return seed/4294967296; }

// ===== Hash String =====
function hashString(str) {
    let h = 0;
    for (let i=0;i<str.length;i++) h = Math.imul(31,h)+str.charCodeAt(i)|0;
    return Math.abs(h);
}

// ===== Wortextraktion =====
function extractWords(text) { return text.split("\n").map(w=>w.trim()).filter(w=>w.length>0); }
function getGistId(url){ const m=url.match(/([a-f0-9]{20,})/i); return m?m[1]:null; }
async function fetchGist(url){
    const id = getGistId(url);
    const res = await fetch("https://api.github.com/gists/"+id);
    const data = await res.json();
    let text="";
    for(let f in data.files) text+=data.files[f].content+"\n";
    return extractWords(text);
}

// ===== Pick deterministisch =====
function pick(pool){ if(pool.length===0) return ""; return pool[Math.floor(rand()*pool.length)]; }

// ===== Render =====
function render(words){
    const div=document.getElementById("words");
    div.innerHTML="";
    words.forEach(w=>{
        const el=document.createElement("div");
        el.className="word";
        el.textContent=w;
        el.onclick=()=>{ words[words.indexOf(w)] = pick(poolA.concat(poolB)); render(words); };
        div.appendChild(el);
    });
}

// ===== Generate =====
function generate(){
    const n=parseInt(document.getElementById("normalCount").value)||0;
    const g=parseInt(document.getElementById("goofyCount").value)||0;
    const custom = extractWords(document.getElementById("customWords").value);
    poolA = listA.concat(custom);
    poolB = listB;

    const codeText=document.getElementById("fancyCode").value.trim();
    seed = hashString(codeText || Math.random().toString());

    srand(seed);

    let words=[];
    for(let i=0;i<n;i++) words.push(pick(poolA));
    for(let i=0;i<g;i++) words.push(pick(poolB));

    render(words);
}

// ===== Init =====
async function init(){
    listA = await fetchGist(DEFAULT_GIST);
    listB = await fetchGist(GOOFY_GIST);

    const params = new URLSearchParams(location.search);
    const codeText=params.get("code");
    if(codeText){
        document.getElementById("controls").style.display="none";
        document.getElementById("fancyCode").value = codeText;
        generate();
    }
}

init();
</script>

</body>
</html>
