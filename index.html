<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wörterbingo</title>
  <style>
    :root{
      --bg:#f5f5f5;
      --card:#ffffff;
      --border:#dedede;
      --accent:#ffdede;
      --text:#111;
      --muted:#666;
    }
    body{
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      text-align:center;
      margin:40px;
      background:var(--bg);
      color:var(--text);
    }
    h1{ margin: 0 0 18px; }

    #controls{
      display:inline-block;
      text-align:left;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px;
      margin: 0 auto 18px;
      max-width: 820px;
      width: min(820px, 95vw);
    }
    .row{ display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; }
    label{ font-size: 14px; color: var(--muted); display:block; margin-bottom:6px; }
    input[type="number"], input[type="text"], textarea{
      font-size:16px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--border);
      outline:none;
      width: 100%;
      box-sizing:border-box;
      background:#fff;
    }
    textarea{ height:110px; resize:vertical; }
    .field{ flex: 1 1 180px; min-width: 180px; }
    .field.wide{ flex: 1 1 380px; min-width: 260px; }

    button{
      cursor:pointer;
      border:1px solid var(--border);
      background:#fff;
      border-radius:10px;
      padding:10px 14px;
      font-size:16px;
    }
    button:hover{ background:var(--accent); }
    button:disabled{ opacity:0.6; cursor:not-allowed; }

    .hint{
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.35;
    }

    #status{
      margin: 10px 0 14px;
      color: var(--muted);
      min-height: 18px;
    }

    #words{
      display:grid;
      gap:10px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      max-width: 980px;
      margin: 0 auto;
    }
    .word{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-height:54px;
      background:var(--card);
      padding:12px 12px;
      border-radius:12px;
      font-size:18px;
      cursor:pointer;
      border:2px solid var(--border);
      user-select:none;
      transition: background 120ms ease, transform 80ms ease;
    }
    .word:hover{ background:var(--accent); }
    .word:active{ transform: scale(0.99); }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 10px;
      align-items:center;
    }
    .pill{
      font-size: 12px;
      color: var(--muted);
      background:#fafafa;
      border:1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
    }
    a{ color: inherit; }
  </style>
</head>
<body>

  <h1>🎯 Wörterbingo sehr real ☯️YIPPY</h1>

  <div id="controls">
    <div class="row">
      <div class="field">
        <label for="normalCount">Normal (Anzahl)</label>
        <input type="number" id="normalCount" value="5" min="0" />
      </div>
      <div class="field">
        <label for="goofyCount">Goofy (Anzahl)</label>
        <input type="number" id="goofyCount" value="0" min="0" />
      </div>
      <div class="field wide">
        <label for="fancyCode">Dein Code (gleicher Code = gleiche Wörter)</label>
        <input type="text" id="fancyCode" placeholder="z.B. MeinCode" />
      </div>
    </div>

    <div class="row" style="margin-top:12px;">
      <div class="field wide" style="flex:1 1 100%;">
        <label for="customWords">Eigene Wörter (eine Zeile = ein Wort)</label>
        <textarea id="customWords" placeholder="z.B.
Bratwurst
Quantenkeks
Taschenrechner"></textarea>
      </div>
    </div>

    <div class="toolbar">
      <button id="generateBtn" type="button">Generieren</button>
      <button id="copyLinkBtn" type="button">Link kopieren (?code=...)</button>
      <span class="pill" id="poolInfo">Pool: –</span>
    </div>

    <div class="hint">
      Klick auf ein Wort = <b>neu würfeln</b> (deterministisch pro Feld: gleicher Code + gleicher Klick-Count auf dieses Feld ⇒ gleiches Ergebnis).<br>
      Hinweis: Wenn du Custom-Wörter änderst, ändert sich auch das Ergebnis (logisch).
    </div>
  </div>

  <div id="status"></div>
  <div id="words"></div>

<script>
  const DEFAULT_GIST = "https://gist.github.com/increpare/4ab077493083edb18919b3666517f248";
  const GOOFY_GIST   = "https://gist.github.com/To-Biobis/271f2a8d44bb5bcfa5156b385843abbd";

  let listA = [];
  let listB = [];
  let poolA = [];
  let poolB = [];

  let codeText = "";
  let rerolls = [];     // rerolls[i] = wie oft Feld i neu gewürfelt wurde
  let words = [];       // aktueller Output

  const elStatus   = document.getElementById("status");
  const elWords    = document.getElementById("words");
  const elPoolInfo = document.getElementById("poolInfo");
  const btnGen     = document.getElementById("generateBtn");
  const btnCopy    = document.getElementById("copyLinkBtn");

  function setStatus(msg){
    elStatus.textContent = msg || "";
  }

  // ===== Utils =====
  function extractWords(text) {
    return text.split("\n").map(w => w.trim()).filter(w => w.length > 0);
  }

  function getGistId(url) {
    const m = url.match(/([a-f0-9]{20,})/i);
    return m ? m[1] : null;
  }

  async function fetchGist(url) {
    const id = getGistId(url);
    if (!id) throw new Error("Ungültige Gist-URL: " + url);

    const res = await fetch("https://api.github.com/gists/" + id);
    if (!res.ok) throw new Error("Gist konnte nicht geladen werden (" + res.status + ")");

    const data = await res.json();
    if (!data.files) return [];

    let text = "";
    for (const f in data.files) {
      text += (data.files[f].content || "") + "\n";
    }
    return extractWords(text);
  }

  // ===== Determinismus =====
  function hashString(str) {
    // 32-bit unsigned
    let h = 0;
    for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
    return h >>> 0;
  }

  function makeRng(seed) {
    let s = seed >>> 0;
    return function rand() {
      s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
      return s / 4294967296;
    };
  }

  function poolNormal(){
    return poolA;
  }
  function poolGoofy(){
    return poolB;
  }

  // Feldtypen: erste n sind normal, die nächsten g sind goofy
  function pickDeterministic(fieldIndex, rerollCount, fieldType) {
    const pool = (fieldType === "goofy") ? poolGoofy() : poolNormal();
    if (!pool || pool.length === 0) return "";

    const seed = hashString(`${codeText}::${fieldType}::${fieldIndex}::${rerollCount}`);
    const rand = makeRng(seed);
    const idx = Math.floor(rand() * pool.length);
    return pool[idx];
  }

  // ===== Render =====
  function render() {
    elWords.innerHTML = "";

    words.forEach((w, i) => {
      const el = document.createElement("div");
      el.className = "word";
      el.textContent = w;

      el.onclick = () => {
        rerolls[i] = (rerolls[i] ?? 0) + 1;

        const n = parseInt(document.getElementById("normalCount").value) || 0;
        const fieldType = (i < n) ? "normal" : "goofy";

        words[i] = pickDeterministic(i, rerolls[i], fieldType);
        render();
      };

      elWords.appendChild(el);
    });
  }

  // ===== Generate =====
  function updatePools() {
    const custom = extractWords(document.getElementById("customWords").value);
    poolA = listA.concat(custom);
    poolB = listB;

    elPoolInfo.textContent = `Pool: normal=${poolA.length}, goofy=${poolB.length} (Custom: ${custom.length})`;
  }

  function generate() {
    const n = parseInt(document.getElementById("normalCount").value) || 0;
    const g = parseInt(document.getElementById("goofyCount").value) || 0;

    updatePools();

    codeText = document.getElementById("fancyCode").value.trim();
    if (!codeText) {
      // Kein leerer Code => sonst nicht sinnvoll teilbar.
      codeText = "Code-" + String(hashString(String(Date.now())));
      document.getElementById("fancyCode").value = codeText;
    }

    if (n > 0 && poolA.length === 0) {
      setStatus("Normal-Pool ist leer (Wortliste konnte evtl. nicht geladen werden).");
      return;
    }
    if (g > 0 && poolB.length === 0) {
      setStatus("Goofy-Pool ist leer (Wortliste konnte evtl. nicht geladen werden).");
      return;
    }

    const total = n + g;
    rerolls = Array(total).fill(0);
    words = Array(total).fill("");

    for (let i = 0; i < total; i++) {
      const fieldType = (i < n) ? "normal" : "goofy";
      words[i] = pickDeterministic(i, 0, fieldType);
    }

    setStatus(`Generiert: ${n} normal, ${g} goofy. Code: ${codeText}`);
    render();
  }

  // ===== Share Link =====
  function buildShareUrl() {
    const url = new URL(location.href);
    url.searchParams.set("code", document.getElementById("fancyCode").value.trim());
    url.searchParams.set("n", String(parseInt(document.getElementById("normalCount").value) || 0));
    url.searchParams.set("g", String(parseInt(document.getElementById("goofyCount").value) || 0));
    return url.toString();
  }

  async function copyShareLink() {
    const code = document.getElementById("fancyCode").value.trim();
    if (!code) {
      setStatus("Bitte erst einen Code eingeben (oder Generieren drücken).");
      return;
    }
    const link = buildShareUrl();
    try {
      await navigator.clipboard.writeText(link);
      setStatus("Link kopiert: " + link);
    } catch {
      // Fallback
      prompt("Kopier den Link:", link);
    }
  }

  // ===== Init =====
  async function init() {
    btnGen.disabled = true;
    btnCopy.disabled = true;
    setStatus("Lade Wortlisten…");

    try {
      // parallel laden
      const [a, b] = await Promise.all([
        fetchGist(DEFAULT_GIST),
        fetchGist(GOOFY_GIST)
      ]);
      listA = a;
      listB = b;

      updatePools();
      setStatus(`Wortlisten geladen: normal=${listA.length}, goofy=${listB.length}.`);
    } catch (e) {
      listA = [];
      listB = [];
      updatePools();
      setStatus("Fehler beim Laden der Wortlisten: " + e.message);
    } finally {
      btnGen.disabled = false;
      btnCopy.disabled = false;
    }

    // URL Params
    const params = new URLSearchParams(location.search);
    const codeParam = params.get("code");
    const nParam = params.get("n");
    const gParam = params.get("g");

    if (nParam !== null) document.getElementById("normalCount").value = String(Math.max(0, parseInt(nParam) || 0));
    if (gParam !== null) document.getElementById("goofyCount").value  = String(Math.max(0, parseInt(gParam) || 0));

    if (codeParam) {
      document.getElementById("controls").style.display = "none";
      document.getElementById("fancyCode").value = codeParam;
      generate();
    }
  }

  // Events
  btnGen.addEventListener("click", generate);
  btnCopy.addEventListener("click", copyShareLink);

  init();
</script>

</body>
</html>
